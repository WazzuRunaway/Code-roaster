version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: coderoast-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: coderoast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coderoast-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: coderoast-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - coderoast-net
    restart: unless-stopped
    # If GPU is available, uncomment the line below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coderoast-backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/coderoast?schema=public
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:3b
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - ollama
    networks:
      - coderoast-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://10.93.24.228/api
    container_name: coderoast-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - coderoast-net
    restart: unless-stopped

networks:
  coderoast-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:

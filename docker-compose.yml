version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: coderoast-db
    environment:
      POSTGRES_USER: coderoast
      POSTGRES_PASSWORD: coderoast_password
      POSTGRES_DB: coderoast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
